services:
  # ============================================================
  # Backend - Django/DRF
  # ============================================================
  - type: web
    name: corpodg-backend-staging
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: >
      git submodule update --init --recursive 2>/dev/null || echo "submodules not accessible (private repos)" &&
      cd Proyecto_CorpoDG_Backend && pip install -r requirements.txt &&
      python manage.py migrate --run-syncdb
    startCommand: cd Proyecto_CorpoDG_Backend && gunicorn corpodg.wsgi:application --bind 0.0.0.0:$PORT --workers 2
    healthCheckPath: /api/destinos/

    envVars:
      - key: PYTHON_VERSION
        value: "3.13.3"
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://corpodg-frontend-staging.onrender.com"
      - key: DB_ENGINE
        value: django.db.backends.postgresql
      - key: DB_NAME
        fromDatabase:
          name: corpodg-db-staging
          property: database
      - key: DB_USER
        fromDatabase:
          name: corpodg-db-staging
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: corpodg-db-staging
          property: password
      - key: DB_HOST
        fromDatabase:
          name: corpodg-db-staging
          property: host
      - key: DB_PORT
        fromDatabase:
          name: corpodg-db-staging
          property: port
      - key: SECRET_KEY
        generateValue: true
      - key: BOOKING_SANDBOX
        value: "1"
      - key: SEATMAP_SANDBOX
        value: "1"
      - key: BOOKING_SEND_EMAIL
        value: "0"
      - key: SABRE_AUTH_URL
        value: "https://api.cert.platform.sabre.com/v2/auth/token"
      - key: CLIENT_ID
        value: "V1:9tho7sxqg11a3rb7:DEVCENTER:EXT"
      - key: CLIENT_SECRET
        value: "pG9hBVv4"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_TEMPLATE_NAME
        sync: false
      - key: WHATSAPP_RECIPIENT_NUMBER
        sync: false
      - key: FRONTEND_BOOKING_SUCCESS_URL
        value: "https://corpodg-frontend-staging.onrender.com/reserva/confirmada"
      - key: FRONTEND_BOOKING_CANCEL_URL
        value: "https://corpodg-frontend-staging.onrender.com/reserva/cancelada"

  # ============================================================
  # Frontend - Vue 3/Vite (static site - create via Dashboard)
  # ============================================================
  # NOTA: Render Blueprint no soporta static_site.
  # Crearlo manualmente en el Dashboard:
  # 1. New Static Site -> conectar repositorio
  # 2. Branch: feat/gabriel/chatbot_v2
  # 3. Build: cd Proyecto_CorpoDG_Frontend && npm install && npm run build
  # 4. Publish: Proyecto_CorpoDG_Frontend/dist
  # 5. Env: VITE_API_URL = https://corpodg-backend-staging.onrender.com/api

# ============================================================
# Database - PostgreSQL 16 (free tier)
# ============================================================
databases:
  - name: corpodg-db-staging
    databaseName: corpodg_staging
    user: corpodg_user
    plan: free
    version: "16"
